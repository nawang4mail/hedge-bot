version: "3.9"

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: hedge_tsdb
    environment:
      POSTGRES_USER: hedge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: hedgebot
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - tsdb_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hedge -d hedgebot"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: hedge_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # GPU support (uncomment if NVIDIA GPU available):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  api:
    build: .
    container_name: hedge_api
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://hedge:${POSTGRES_PASSWORD}@timescaledb:5432/hedgebot
      - OLLAMA_BASE_URL=http://ollama:11434
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/application_default_credentials.json
    ports:
      - "8000:8000"
    depends_on:
      - ollama
      - timescaledb
    volumes:
      - .:/app
      - ~/.config/gcloud:/root/.config/gcloud:ro
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

volumes:
  ollama_data:
  tsdb_data:
